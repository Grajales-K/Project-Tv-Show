<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Show Project | Karla Grajales (Grajales-K)</title>
  <link href="style.css" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
</head>

<body>
  <header class="main-header">
    <div class="header-top">
      <h1>TV Maze Explorer</h1>
      <p id="episodeCount"></p>
    </div>
    <nav class="controls-container">

      <div class="control-group search-wrapper">
        <div class="control-group search-wrapper">
          <label for="searchInput">Search</label>
          <input type="text" id="searchInput" class="select" placeholder="Search episodes..." />
        </div>

        <div id="hide-shows" class="control-group">
          <label for="showSelector">Show:</label>
          <select id="showSelector" class="select">
            <option value="">All Shows</option>
          </select>
        </div>

        <div id="episode-filter-group" class="control-group">
          <label for="episodeSelector">Select by Episode:</label>
          <select id="episodeSelector" class="select">
            <option value="">All Episodes</option>
          </select>
        </div>
      </div>
    </nav>
  </header>
  <main id="root">
    <div id="show-title-container"></div>
    <div id="content-grid" class="grid-layout"></div>

  </main>
  <footer class="main-footer">
    <p>
      © 2026 TV World - Data originally comes from
      <a href="https://tvmaze.com/" target="_blank" rel="noopener">TV Maze!</a>
    </p>
  </footer>
  <script src="script.js"></script>
</body>

</html>
